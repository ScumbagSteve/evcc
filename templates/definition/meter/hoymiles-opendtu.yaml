template: hoymiles-opendtu
products:
  - brand: Hoymiles
    description:
      generic: HM & HMS Series (via OpenDTU)
params:
  - name: usage
    choice: ["pv"]
  - name: host
    - name: inverter_id
    description: "Optional, nur für Dimming benötigt"
     help: Eingabe der primären Wechselrichter ID. Falls mehrere existieren, einen beliebigen wählen.
    advanced: true
render: |
  type: custom
  power:
    source: http
    uri: http://{{ .host }}/api/livedata/status
    jq: .total.Power.v
  energy:
    source: http
    uri: http://{{ .host }}/api/livedata/status
    jq: .total.YieldTotal.v
  {{- if .inverter_id }}
  setpoint:
    source: http
    uri: http://{{ .host }}/api/limit/config
    method: POST
    body: '{"serial": "0x{{ printf "%016x" .inverter_id }}", "limit_value": {{ .setpoint }}, "limit_type": 3}' #über limit_type 3 wird die zur Verfügung stehende Leistung gleichmäßig auf alle Wechselrichter verteilt
  {{- end }}
